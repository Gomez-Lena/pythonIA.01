<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🌈 Trivia My Little Pony</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="cloud" style="top:70px;animation-duration:55s;"></div>

<div class="cloud" style="top:220px;animation-duration:70s;"></div>

<div class="cloud" style="top:420px;animation-duration:60s;"></div>
<div class="background-stars"></div>

<div class="container">

    <div class="logo">
    ✨🦄✨
</div>

<h1>My Little Pony Quiz</h1>

    <div class="progress-text">
        Pregunta {{ numero }} de {{ total }}
    </div>

    <div class="question-card">

        <h2>{{ pregunta }}</h2>

        <form method="POST">

            {% for opcion in opciones %}

            <label class="option-card">

    <input
        class="radio-hidden"
        type="radio"
        name="respuesta"
        value="{{ opcion }}"
        required>

    <div class="pony-option">

        <div class="pony-icon">🦄</div>

        <div class="pony-text">
            {{ opcion }}
        </div>

    </div>

</label>

            {% endfor %}

            <button type="submit">
                ✨ Responder ✨
            </button>

        </form>

    </div>

</div>

</body>
</html>
